<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .btn-orange {
            background: #e85d04;
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-orange:hover {
            background: #bb3e03;
            color: white;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container text-center py-5 mt-5">
        <div class="py-5">
            <i class="bi bi-exclamation-triangle fs-1 text-warning"></i>
            <h1 class="display-1 fw-bold text-secondary">404</h1>
            <h2 class="mb-4">Страница не найдена</h2>
            <p class="text-secondary mb-4">Запрашиваемая страница не существует или была перемещена</p>
            <a href="/" class="btn-orange">Вернуться на главную</a>
        </div>
    </div>
</body>

</html>
