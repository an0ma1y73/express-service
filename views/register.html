<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Экспресс-Сервис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .btn-orange {
            background: #e85d04;
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            border: none;
            width: 100%;
            transition: 0.3s;
        }

        .btn-orange:hover {
            background: #bb3e03;
            transform: translateY(-2px);
        }

        .card {
            border: none;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h1 class="fw-bold">Экспресс<span style="color:#e85d04">-Сервис</span></h1>
                    </a>
                </div>
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4">Регистрация</h2>
                        <div id="errorMsg" class="alert alert-danger d-none"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Имя</label>
                                <input type="text" id="name" class="form-control form-control-lg rounded-3"
                                    placeholder="Алексей" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="email" class="form-control form-control-lg rounded-3"
                                    placeholder="user@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Пароль (мин. 6 символов)</label>
                                <input type="password" id="password" class="form-control form-control-lg rounded-3"
                                    required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Подтверждение пароля</label>
                                <input type="password" id="confirm" class="form-control form-control-lg rounded-3"
                                    required>
                            </div>
                            <button type="submit" class="btn btn-orange btn-lg">Зарегистрироваться</button>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-secondary">Уже есть аккаунт? <a href="/login"
                                    class="text-decoration-none fw-semibold" style="color:#e85d04">Войти</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm')?.addEventListener('submit', async function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errDiv = document.getElementById('errorMsg');
            errDiv.classList.add('d-none');

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, confirm })
                });
                const data = await response.json();

                if (data.success) {
                    const loginResponse = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const loginData = await loginResponse.json();
                    if (loginData.success) {
                        window.location.href = '/';
                    } else {
                        window.location.href = '/login';
                    }
                } else {
                    errDiv.classList.remove('d-none');
                    errDiv.textContent = data.message;
                }
            } catch (error) {
                errDiv.classList.remove('d-none');
                errDiv.textContent = 'Ошибка соединения с сервером';
            }
        });

        fetch('/api/me').then(r => r.json()).then(data => {
            if (data.authenticated) window.location.href = '/';
        }).catch(() => { });
    </script>
</body>

</html>
